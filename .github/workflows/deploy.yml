name: Deploy to VPS
on:
  push:
      branches: [main]
      jobs:
        deploy:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v4
                            - name: Deploy to VPS
                                    uses: appleboy/ssh-action@v1.0.3
                                            with:
                                                      host: ${{ secrets.VPS_HOST }}
                                                                username: root
                                                                          key: ${{ secrets.VPS_SSH_KEY }}
                                                                                    script: |
                                                                                                cd /tmp && rm -rf tax-pr-app
                                                                                                            git clone --depth 1 https://github.com/brandoncheema-ops/tax-pr-app.git
                                                                                                                        mkdir -p /opt/apps/tax-pr-app
                                                                                                                                    rsync -av --delete --exclude='.git' --exclude='venv' tax-pr-app/ /opt/apps/tax-pr-app/
                                                                                                                                                cd /opt/apps/tax-pr-app
                                                                                                                                                            python3 -m venv venv 2>/dev/null || true
                                                                                                                                                                        source venv/bin/activate && pip install streamlit pandas -q && deactivate
                                                                                                                                                                                    pm2 restart tax-pr-app 2>/dev/null || pm2 start "/opt/apps/tax-pr-app/venv/bin/streamlit run app.py --server.port 8501 --server.baseUrlPath /tax-pr-app --server.headless true" --name tax-pr-app --cwd /opt/apps/tax-pr-app
                                                                                                                                                                                                pm2 save && rm -rf /tmp/tax-pr-app
